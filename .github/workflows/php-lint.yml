name: PHP Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpcs:
    name: PHP CodeSniffer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer, cs2pr

      - name: Install PHP_CodeSniffer + WordPress Coding Standards
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --dev squizlabs/php_codesniffer dealerdirect/phpcodesniffer-composer-installer wp-coding-standards/wpcs
          echo "$HOME/.composer/vendor/bin" >> $GITHUB_PATH

      - name: Verify standards are registered
        run: phpcs -i

      - name: Run PHPCS (human-readable report)
        # continue-on-error so violations are logged but the job doesn't fail
        continue-on-error: true
        run: |
          phpcs \
            --standard=app/public/phpcs.xml \
            --report=full \
            --report-summary \
            --no-colors

      - name: Run PHPCS (GitHub annotations)
        # 2>/dev/null prevents deprecation warnings from corrupting the checkstyle XML
        continue-on-error: true
        run: |
          phpcs \
            --standard=app/public/phpcs.xml \
            --report=checkstyle \
            --no-colors \
            2>/dev/null \
            | cs2pr --graceful-warnings
